<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ego on the Line</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎾</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&family=Archivo+Black&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ============================================================
     ==  CONFIGURAÇÃO: cola aqui as tuas 2 chaves do Supabase  ==
     ==  (estão logo abaixo, no <script>, procura SUPABASE_URL) ==
     ============================================================ */

  :root {
    --court: #2f7d4f;        /* verde relva do court */
    --court-dark: #256540;
    --line: #f4f7f2;         /* linhas brancas */
    --ball: #d9f24a;         /* amarelo-ténis, cor de assinatura */
    --ball-dark: #b9d024;
    --ink: #14251a;
    --paper: #f4f7f2;
    --muted: #6b8574;
    --clay: #c96a4a;         /* terra batida, para derrotas */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Archivo', system-ui, sans-serif;
    background: var(--court);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 640px; margin: 0 auto; padding: 0 16px 60px; }

  /* ---- Cabeçalho: faixa de court ---- */
  header {
    background: var(--court);
    border-bottom: 3px solid var(--line);
    padding: 34px 0 30px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    /* linha central do court */
    content: "";
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 2px;
    background: rgba(244,247,242,.35);
    transform: translateX(-50%);
  }
  .header-inner { position: relative; text-align: center; }
  .ball {
    width: 46px; height: 46px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--ball), var(--ball-dark));
    margin: 0 auto 12px;
    position: relative;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  .ball::before, .ball::after {
    content: ""; position: absolute; inset: 0;
    border: 2px solid rgba(255,255,255,.9);
    border-radius: 50%;
  }
  .ball::before { clip-path: inset(0 55% 0 -20%); transform: rotate(18deg); }
  .ball::after  { clip-path: inset(0 -20% 0 55%); transform: rotate(-18deg); }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    color: var(--line);
    font-size: 30px;
    letter-spacing: -.5px;
    text-transform: uppercase;
  }

  /* ---- Abas ---- */
  nav.tabs {
    display: flex;
    gap: 6px;
    background: var(--court-dark);
    padding: 6px;
    border-radius: 12px;
    margin: 20px 0 22px;
  }
  .tab {
    flex: 1;
    padding: 11px 8px;
    border: none;
    background: transparent;
    color: rgba(244,247,242,.65);
    font-family: 'Archivo', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    letter-spacing: .3px;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .tab:hover { color: var(--line); }
  .tab.active { background: var(--ball); color: var(--ink); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ---- Cartão base ---- */
  .card {
    background: var(--paper);
    border-radius: 14px;
    padding: 4px;
    box-shadow: 0 6px 22px rgba(0,0,0,.18);
  }

  /* ---- Duelos head-to-head ---- */
  .duels { display: flex; flex-direction: column; gap: 14px; }

  .duel-card {
    background: var(--paper);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 6px 22px rgba(0,0,0,.18);
  }
  .duel-title {
    background: var(--court-dark);
    color: rgba(244,247,242,.75);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 8px 16px;
    font-weight: 600;
  }
  .duel-body {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 20px 16px 18px;
    gap: 8px;
  }
  .duel-player { text-align: center; }
  .duel-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .duel-record {
    font-size: 36px;
    font-family: 'Archivo Black', sans-serif;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .duel-record.leading { color: var(--court); }
  .duel-record.trailing { color: var(--clay); }
  .duel-record.tied { color: var(--muted); }
  .duel-sep {
    font-family: 'Archivo Black', sans-serif;
    color: #c8d6cb;
    font-size: 22px;
    text-align: center;
    padding: 0 4px;
  }
  .duel-footer {
    border-top: 1px solid #e6ede8;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12.5px;
    color: var(--muted);
  }
  .duel-footer .leader {
    font-weight: 600;
    color: var(--court);
  }
  .duel-footer .tied-label { color: var(--muted); font-style: italic; }

  /* ---- Formulário ---- */
  .field { padding: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--muted);
    margin-bottom: 7px;
    font-weight: 600;
  }
  select, input[type="text"], input[type="datetime-local"] {
    width: 100%;
    padding: 12px 13px;
    border: 1.5px solid #d3ddd6;
    border-radius: 9px;
    font-family: 'Archivo', sans-serif;
    font-size: 15px;
    background: #fff;
    color: var(--ink);
  }
  select:focus, input:focus { outline: none; border-color: var(--court); }

  .players-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: end; }
  .vs { padding-bottom: 12px; font-family: 'Archivo Black', sans-serif; color: var(--muted); }

  .set-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-row .set-label { font-size: 12px; color: var(--muted); width: 48px; font-weight: 600; }
  .set-row input { width: 70px; text-align: center; }
  .set-dash { font-weight: 700; color: var(--muted); }
  .tb-wrap { display: flex; align-items: center; gap: 4px; margin-left: 4px; }
  .tb-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .tb-input { width: 46px !important; font-size: 13px !important; padding: 8px 6px !important; text-align: center; }
  sup.tb { font-size: 0.6em; vertical-align: super; color: var(--muted); font-family: 'Archivo', sans-serif; font-weight: 600; }

  .btn-set {
    background: none; border: 1.5px dashed var(--court);
    color: var(--court); padding: 9px; width: 100%;
    border-radius: 9px; font-weight: 600; cursor: pointer;
    font-family: 'Archivo', sans-serif; font-size: 13px; margin-top: 4px;
  }
  .btn-remove-set {
    background: none; border: none; color: var(--clay);
    cursor: pointer; font-size: 18px; line-height: 1; padding: 4px 8px;
  }
  .time-note { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--ball);
    color: var(--ink);
    border: none;
    border-radius: 11px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: .5px;
    cursor: pointer;
    margin-top: 6px;
    transition: transform .1s;
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .form-msg { text-align: center; padding: 10px 14px; font-size: 14px; min-height: 20px; }
  .form-msg.ok { color: var(--court); font-weight: 600; }
  .form-msg.err { color: var(--clay); font-weight: 600; }

  /* ---- Histórico ---- */
  .match {
    background: var(--paper);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: 0 3px 12px rgba(0,0,0,.12);
  }
  .match-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .match-players { font-weight: 600; font-size: 15.5px; }
  .match-players .win { color: var(--court); }
  .match-players .draw { color: var(--muted); }
  .match-score {
    font-family: 'Archivo Black', sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 15px;
    letter-spacing: .5px;
    white-space: nowrap;
  }
  .match-meta { color: var(--muted); font-size: 12.5px; margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
  .tag-draw {
    display: inline-block; background: #e6ede8; color: var(--muted);
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px;
    padding: 2px 7px; border-radius: 5px; font-weight: 600; margin-left: 6px;
  }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14.5px; }
  .loading { text-align: center; color: rgba(244,247,242,.8); padding: 30px; }

  .config-warn {
    background: #fff3cd; color: #7a5b00; border: 1.5px solid #ffe08a;
    padding: 14px 16px; border-radius: 11px; margin-bottom: 16px; font-size: 13.5px; line-height: 1.5;
  }
  code { background: rgba(0,0,0,.08); padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="ball"></div>
    <h1>Ego on the Line</h1>
  </div>
</header>

<div class="wrap">

  <nav class="tabs">
    <button class="tab active" data-panel="standings">Classificação</button>
    <button class="tab" data-panel="add">Novo jogo</button>
    <button class="tab" data-panel="history">Histórico</button>
  </nav>

  <div id="config-warn"></div>

  <!-- ===== CLASSIFICAÇÃO ===== -->
  <section class="panel active" id="standings">
    <div class="duels" id="duels-container">
      <div class="loading">A carregar...</div>
    </div>
  </section>

  <!-- ===== NOVO JOGO ===== -->
  <section class="panel" id="add">
    <div class="card">
      <div class="field">
        <div class="players-row">
          <div>
            <label>Jogador 1</label>
            <select id="p1"></select>
          </div>
          <div class="vs">vs</div>
          <div>
            <label>Jogador 2</label>
            <select id="p2"></select>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Resultado (por sets)</label>
        <div id="sets"></div>
        <button class="btn-set" id="add-set">+ adicionar set</button>
      </div>

      <div class="field">
        <label>Local</label>
        <select id="location-select" onchange="handleLocationSelect(this.value)">
          <option value="Varatojo">Varatojo</option>
          <option value="Turcifal">Turcifal</option>
          <option value="Clube TV">Clube TV</option>
          <option value="outro">Outro...</option>
        </select>
        <input type="text" id="location-other" placeholder="Qual o local?" style="display:none; margin-top:8px;">
      </div>

      <div class="field">
        <label>Data e hora</label>
        <input type="datetime-local" id="played_at">
        <div class="time-note">A hora é opcional, fica só para referência.</div>
      </div>

      <div class="field">
        <button class="btn-primary" id="submit">Registar jogo</button>
        <div class="form-msg" id="form-msg"></div>
      </div>
    </div>
  </section>

  <!-- ===== HISTÓRICO ===== -->
  <section class="panel" id="history">
    <div id="history-list">
      <div class="loading">A carregar...</div>
    </div>
  </section>

</div>

<script>
/* ============================================================
   ==            COLA AQUI AS TUAS 2 CHAVES                  ==
   ==  Supabase → Project Settings → API                     ==
   ============================================================ */
const SUPABASE_URL = "https://cpnkgnfevlgkkhcjnwqb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwbmtnbmZldmxna2toY2pud3FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjMxMTAsImV4cCI6MjA5ODYzOTExMH0.M-MgmKwwAS0Pzo-kASiQnJMQ9o1CplejpMOOZCwEglM";

/* Os jogadores da liga. Muda os nomes se quiseres. */
const PLAYERS = ["Rodrigo", "Malheiro", "André"];

/* ============================================================ */

const configured = !SUPABASE_URL.startsWith("COLA_") && !SUPABASE_KEY.startsWith("COLA_");
let db = null;
if (configured) db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let matches = [];

// ---- Abas ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
  });
});

// ---- Preencher selects de jogadores ----
function fillPlayerSelects() {
  const p1 = document.getElementById('p1');
  const p2 = document.getElementById('p2');
  PLAYERS.forEach(name => {
    p1.add(new Option(name, name));
    p2.add(new Option(name, name));
  });
  p2.selectedIndex = 1;
}

// ---- Sets dinâmicos ----
function addSetRow(n) {
  const wrap = document.getElementById('sets');
  const row = document.createElement('div');
  row.className = 'set-row';
  row.style.flexWrap = 'wrap';
  row.innerHTML = `
    <span class="set-label">Set ${n}</span>
    <input type="text" inputmode="numeric" class="s-a" placeholder="7" maxlength="2">
    <span class="set-dash">–</span>
    <input type="text" inputmode="numeric" class="s-b" placeholder="5" maxlength="2">
    <div class="tb-wrap">
      <span class="tb-label">TB</span>
      <input type="text" inputmode="numeric" class="s-tb tb-input" placeholder="–" maxlength="2" title="Pontos do perdedor no tiebreak (opcional)">
    </div>
    <button class="btn-remove-set" title="remover" onclick="this.parentElement.remove(); renumberSets();">×</button>
  `;
  wrap.appendChild(row);
}
function renumberSets() {
  document.querySelectorAll('#sets .set-row .set-label').forEach((el, i) => {
    el.textContent = 'Set ' + (i + 1);
  });
}
document.getElementById('add-set').addEventListener('click', () => {
  addSetRow(document.querySelectorAll('#sets .set-row').length + 1);
});

// ---- Calcular vencedor a partir dos sets ----
function decideWinner(m) {
  let s1 = 0, s2 = 0;
  m.sets.forEach(([a, b]) => { if (a > b) s1++; else if (b > a) s2++; });
  if (s1 > s2) return m.player1;
  if (s2 > s1) return m.player2;
  return null; // empate: não conta para ninguém
}

// ---- Duelos head-to-head ----
const DUELS = [
  { a: 'Rodrigo', b: 'Malheiro' },
  { a: 'Rodrigo', b: 'André' },
];

function calcDuel(pa, pb) {
  let va = 0, vb = 0;
  matches.forEach(m => {
    const players = [m.player1, m.player2];
    if (!players.includes(pa) || !players.includes(pb)) return;
    const w = decideWinner(m);
    if (!w) return;
    if (w === pa) va++; else vb++;
  });
  return { va, vb };
}

function renderDuels() {
  const container = document.getElementById('duels-container');
  container.innerHTML = DUELS.map(({ a, b }) => {
    const { va, vb } = calcDuel(a, b);
    const total = va + vb;
    const aLeads = va > vb, bLeads = vb > va, tied = va === vb;

    const aClass = aLeads ? 'leading' : bLeads ? 'trailing' : 'tied';
    const bClass = bLeads ? 'leading' : aLeads ? 'trailing' : 'tied';

    let footerText;
    if (total === 0) {
      footerText = `<span class="tied-label">Ainda sem jogos</span>`;
    } else if (tied) {
      footerText = `<span class="tied-label">Empatados — ${va}-${vb}</span><span>${total} jogo${total > 1 ? 's' : ''}</span>`;
    } else {
      const leader = aLeads ? a : b;
      const diff = Math.abs(va - vb);
      footerText = `<span class="leader">${leader} lidera por ${diff}</span><span>${total} jogo${total > 1 ? 's' : ''}</span>`;
    }

    return `
      <div class="duel-card">
        <div class="duel-title">Head-to-head</div>
        <div class="duel-body">
          <div class="duel-player">
            <div class="duel-name">${a}</div>
            <div class="duel-record ${aClass}">${va}</div>
          </div>
          <div class="duel-sep">–</div>
          <div class="duel-player">
            <div class="duel-name">${b}</div>
            <div class="duel-record ${bClass}">${vb}</div>
          </div>
        </div>
        <div class="duel-footer">${footerText}</div>
      </div>`;
  }).join('');
}

// ---- Histórico ----
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const hora = (d.getHours() || d.getMinutes())
    ? ` · ${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`
    : '';
  return `${d.getDate()} ${meses[d.getMonth()]}${hora}`;
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (matches.length === 0) {
    list.innerHTML = `<div class="empty">Ainda não há jogos.<br>Regista o primeiro na aba "Novo jogo".</div>`;
    return;
  }

  list.innerHTML = matches.map(m => {
    const w = decideWinner(m);
    const p1cls = w === m.player1 ? 'win' : (w === null ? 'draw' : '');
    const p2cls = w === m.player2 ? 'win' : (w === null ? 'draw' : '');
    const score = m.sets.map(s => {
      const [a, b, tb] = s;
      if (tb === undefined || tb === null) return `${a}-${b}`;
      // tb é os pontos do perdedor; o perdedor do set é quem tem o score mais baixo
      if (a > b) return `${a}-${b}<sup class="tb">${tb}</sup>`;
      else        return `${a}<sup class="tb">${tb}</sup>-${b}`;
    }).join('  ');
    const meta = [];
    if (m.location) meta.push('📍 ' + m.location);
    if (m.played_at) meta.push(fmtDate(m.played_at));

    return `
      <div class="match">
        <div class="match-top">
          <div class="match-players">
            <span class="${p1cls}">${m.player1}</span>
            <span style="color:var(--muted)"> vs </span>
            <span class="${p2cls}">${m.player2}</span>
            ${w === null ? '<span class="tag-draw">empate</span>' : ''}
          </div>
          <div class="match-score">${score}</div>
        </div>
        ${meta.length ? `<div class="match-meta">${meta.map(x => `<span>${x}</span>`).join('')}</div>` : ''}
      </div>`;
  }).join('');
}

// ---- Carregar jogos ----
async function loadMatches() {
  if (!db) return;
  const { data, error } = await db
    .from('matches')
    .select('*')
    .order('played_at', { ascending: false, nullsFirst: false })
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('duels-container').innerHTML =
      `<div class="empty" style="color:var(--line)">Erro a ligar à base de dados.<br>Confirma as chaves e a tabela.</div>`;
    return;
  }
  matches = data || [];
  renderDuels();
  renderHistory();
}

// ---- Submeter jogo ----
document.getElementById('submit').addEventListener('click', async () => {
  const msg = document.getElementById('form-msg');
  const btn = document.getElementById('submit');
  msg.className = 'form-msg';
  msg.textContent = '';

  const p1 = document.getElementById('p1').value;
  const p2 = document.getElementById('p2').value;
  if (p1 === p2) { msg.className = 'form-msg err'; msg.textContent = 'Escolhe dois jogadores diferentes.'; return; }

  const sets = [];
  let ok = true;
  document.querySelectorAll('#sets .set-row').forEach(row => {
    const a = row.querySelector('.s-a').value.trim();
    const b = row.querySelector('.s-b').value.trim();
    if (a === '' && b === '') return;
    const na = parseInt(a, 10), nb = parseInt(b, 10);
    if (isNaN(na) || isNaN(nb)) { ok = false; return; }
    const tbVal = row.querySelector('.s-tb').value.trim();
    const ntb = tbVal !== '' ? parseInt(tbVal, 10) : null;
    sets.push(ntb !== null && !isNaN(ntb) ? [na, nb, ntb] : [na, nb]);
  });

  if (!ok || sets.length === 0) {
    msg.className = 'form-msg err';
    msg.textContent = 'Preenche pelo menos um set com números válidos.';
    return;
  }

  const record = {
    player1: p1,
    player2: p2,
    sets: sets,
    location: getLocation(),
    played_at: document.getElementById('played_at').value || null,
  };

  btn.disabled = true;
  msg.className = 'form-msg';
  msg.textContent = 'A guardar...';

  const { error } = await db.from('matches').insert(record);
  btn.disabled = false;

  if (error) {
    msg.className = 'form-msg err';
    msg.textContent = 'Não deu para guardar. Tenta outra vez.';
    return;
  }

  msg.className = 'form-msg ok';
  msg.textContent = 'Jogo registado! 🎾';
  resetLocation();
  document.getElementById('played_at').value = '';
  document.getElementById('sets').innerHTML = '';
  addSetRow(1); addSetRow(2);
  await loadMatches();
  setTimeout(() => { msg.textContent = ''; }, 2500);
});

// ---- Local: dropdown + "Outro" ----
function handleLocationSelect(val) {
  const other = document.getElementById('location-other');
  other.style.display = val === 'outro' ? 'block' : 'none';
  if (val !== 'outro') other.value = '';
}
function getLocation() {
  const sel = document.getElementById('location-select').value;
  if (sel === 'outro') {
    const v = document.getElementById('location-other').value.trim();
    return v || null;
  }
  return sel;
}
function resetLocation() {
  document.getElementById('location-select').selectedIndex = 0;
  document.getElementById('location-other').style.display = 'none';
  document.getElementById('location-other').value = '';
}

// ---- Arranque ----
function init() {
  fillPlayerSelects();
  addSetRow(1);
  addSetRow(2);

  if (!configured) {
    document.getElementById('config-warn').innerHTML = `
      <div class="config-warn">
        <strong>Falta configurar.</strong> Abre este ficheiro e cola o teu
        <code>SUPABASE_URL</code> e a <code>SUPABASE_KEY</code> no topo do
        &lt;script&gt;. Depois disso a app começa a guardar os jogos.
      </div>`;
    document.getElementById('duels-container').innerHTML =
      `<div class="empty" style="color:var(--line)">À espera das chaves do Supabase.</div>`;
    document.getElementById('history-list').innerHTML =
      `<div class="empty">À espera das chaves do Supabase.</div>`;
    return;
  }

  loadMatches();
}

init();
</script>
</body>
</html>
